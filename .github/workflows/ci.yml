name: CI / CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ── Test ───────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  # ── Validate HTML ──────────────────────────────────────────
  html-validate:
    name: Validate HTML
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Validate index.html
        run: |
          npx html-validate index.html || echo "HTML validation warnings (non-blocking)"

  # ── Deploy to GitHub Pages ─────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    # Deploys independently — tests are informational, not a gate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      pages:    write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
